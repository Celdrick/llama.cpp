name: Release

on:
  workflow_dispatch:
    inputs:
      create_release:
        description: 'Create new release'
        required: true
        type: boolean
  push:
    branches:
      - master
    paths: [
      '.github/workflows/release.yml',
      '**/CMakeLists.txt',
      '**/.cmake',
      '**/*.h',
      '**/*.hpp',
      '**/*.c',
      '**/*.cpp',
    ]

concurrency:
  group: ${{ github.workflow }}-${{ github.head_ref && github.ref || github.run_id }}
  cancel-in-progress: true

env:
  BRANCH_NAME: ${{ github.head_ref || github.ref_name }}

jobs:
  openeuler-cpu:
    strategy:
      matrix:
        include:
          - build: 'x64'
            arch: 'amd64'
            os: ubuntu-latest

    runs-on: ${{ matrix.os }}

    steps:
      - name: Clone
        id: checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Pull openEuler image
        run: docker pull openeuler/openeuler:22.03

      - name: Build
        env:
          ARCH: ${{ matrix.arch }}
        run: |
          HOST_UID=$(id -u)
          HOST_GID=$(id -g)

          docker run --rm \
            -v "${PWD}:/workspace" \
            -w /workspace \
            -e ARCH=${ARCH} \
            openeuler/openeuler:22.03 \
            bash -lc '
              set -e
              yum install -y --setopt=install_weak_deps=False --setopt=tsflags=nodocs \
                gcc gcc-c++ make git cmake openssl-devel
              yum clean all && rm -rf /var/cache/yum

              if [ "$ARCH" = "amd64" ] || [ "$ARCH" = "arm64" ]; then
                cmake -S . -B build \
                  -DCMAKE_BUILD_TYPE=Release \
                  -DGGML_NATIVE=OFF \
                  -DLLAMA_BUILD_TESTS=OFF \
                  -DLLAMA_BUILD_EXAMPLES=OFF \
                  -DLLAMA_BUILD_TOOLS=ON \
                  -DLLAMA_BUILD_SERVER=ON
              else
                echo "Unsupported architecture"
                exit 1
              fi

              cmake --build build -j $(nproc)

              chown -R '"${HOST_UID}"':'"${HOST_GID}"' /workspace/build
            '

      - name: Determine tag name
        id: tag
        uses: ./.github/actions/get-tag-name

      - name: Pack artifacts
        run: |
          cp LICENSE ./build/bin/
          tar -czvf llama-${{ steps.tag.outputs.name }}-bin-openeuler-cpu-${{ matrix.build }}.tar.gz \
            --transform "s,./,llama-${{ steps.tag.outputs.name }}/," \
            -C ./build/bin .

      - name: Upload artifacts
        uses: actions/upload-artifact@v6
        with:
          path: llama-${{ steps.tag.outputs.name }}-bin-openeuler-cpu-${{ matrix.build }}.tar.gz
          name: llama-bin-openeuler-cpu-${{ matrix.build }}.tar.gz

  release:
    if: ${{ ( github.event_name == 'push' && github.ref == 'refs/heads/master' ) || github.event.inputs.create_release == 'true' }}

    permissions:
      contents: write

    runs-on: ubuntu-slim

    needs:
      - openeuler-cpu

    steps:
      - name: Clone
        id: checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Determine tag name
        id: tag
        uses: ./.github/actions/get-tag-name

      - name: Download artifacts
        uses: actions/download-artifact@v7
        with:
          path: ./artifact
          merge-multiple: true

      - name: Move artifacts
        run: |
          mkdir -p release
          mv -v artifact/*.tar.gz release/

      - name: Create release
        id: create_release
        uses: ggml-org/action-create-release@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tag_name: ${{ steps.tag.outputs.name }}
          body: |
            <details open>

            ${{ github.event.head_commit.message }}

            </details>

            **openEuler CPU:**
            - [openEuler x64 (CPU)](https://github.com/ggml-org/llama.cpp/releases/download/${{ steps.tag.outputs.name }}/llama-${{ steps.tag.outputs.name }}-bin-openeuler-cpu-x64.tar.gz)

      - name: Upload release
        uses: actions/github-script@v8
        with:
          github-token: ${{secrets.GITHUB_TOKEN}}
          script: |
            const path = require('path');
            const fs = require('fs');
            const release_id = '${{ steps.create_release.outputs.id }}';
            for (let file of await fs.readdirSync('./release')) {
              if (path.extname(file) === '.zip' || file.endsWith('.tar.gz')) {
                console.log('uploadReleaseAsset', file);
                await github.rest.repos.uploadReleaseAsset({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  release_id: release_id,
                  name: file,
                  data: await fs.readFileSync(`./release/${file}`)
                });
              }
            }
