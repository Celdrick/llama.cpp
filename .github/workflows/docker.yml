# This workflow uses actions that are not certified by GitHub.
# They are provided by a third-party and are governed by
# separate terms of service, privacy policy, and support
# documentation.

# GitHub recommends pinning actions to a commit SHA.
# To get a newer version of the action, you will need to update the SHA.
# You can also reference a tag or branch, but the action may change without warning.

name: Publish Docker image

on:
  workflow_dispatch: # allows manual triggering
  schedule:
    # Rebuild daily
    - cron: '12 4 * * *'

concurrency:
  group: ${{ github.workflow }}-${{ github.head_ref && github.ref || github.run_id }}
  cancel-in-progress: true

# Fine-grant permission
# https://docs.github.com/en/actions/security-for-github-actions/security-guides/automatic-token-authentication#modifying-the-permissions-for-the-GITHUB_TOKEN
permissions:
  packages: write

env:
  ALIYUN_PREFIX: ${{ secrets.ALIYUN_REGISTRY }}/${{ secrets.ALIYUN_NAME_SPACE }}/llama.cpp
  DOCKERHUB_PREFIX: ${{ secrets.DOCKERHUB_USERNAME }}/llama.cpp

jobs:
  build_and_push:
    name: Build and push Docker images
    runs-on: ubuntu-24.04

    strategy:
      fail-fast: false
      matrix:
        target: ['full', 'light', 'server']

    steps:
      - name: Check out the repo
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@4d04d5d9486b7bd6fa91e7baf45bbb4f8b9deedd # v4

      - name: Log in to Aliyun Registry
        uses: docker/login-action@b45d80f862d83dbcd57f89517bcf500b2ab88fb2 # v4
        with:
          registry: ${{ secrets.ALIYUN_REGISTRY }}
          username: ${{ secrets.ALIYUN_REGISTRY_USER }}
          password: ${{ secrets.ALIYUN_REGISTRY_PASSWORD }}

      - name: Log in to Docker Hub
        uses: docker/login-action@b45d80f862d83dbcd57f89517bcf500b2ab88fb2 # v4
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_PASSWORD }}

      - name: Build and push to Aliyun Registry
        uses: docker/build-push-action@d08e5c354a6adb9ed34480a06d141179aa583294 # v7
        with:
          context: .
          platforms: linux/amd64
          push: true
          tags: |
            ${{ env.ALIYUN_PREFIX }}:${{ matrix.target }}
          file: .devops/cpu.Dockerfile
          target: ${{ matrix.target }}
          provenance: false
          cache-from: type=registry,ref=${{ env.ALIYUN_PREFIX }}:buildcache-cpu-amd64
          cache-to: type=registry,ref=${{ env.ALIYUN_PREFIX }}:buildcache-cpu-amd64,mode=max

      - name: Build and push to Docker Hub
        uses: docker/build-push-action@d08e5c354a6adb9ed34480a06d141179aa583294 # v7
        with:
          context: .
          platforms: linux/amd64
          push: true
          tags: |
            ${{ env.DOCKERHUB_PREFIX }}:${{ matrix.target }}
          file: .devops/cpu.Dockerfile
          target: ${{ matrix.target }}
          provenance: false
          cache-from: type=registry,ref=${{ env.ALIYUN_PREFIX }}:buildcache-cpu-amd64

  build_builder:
    name: Build and push offline builder image (x64 CPU)
    runs-on: ubuntu-24.04

    steps:
      - name: Check out the repo
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@4d04d5d9486b7bd6fa91e7baf45bbb4f8b9deedd # v4

      - name: Log in to Aliyun Registry
        uses: docker/login-action@b45d80f862d83dbcd57f89517bcf500b2ab88fb2 # v4
        with:
          registry: ${{ secrets.ALIYUN_REGISTRY }}
          username: ${{ secrets.ALIYUN_REGISTRY_USER }}
          password: ${{ secrets.ALIYUN_REGISTRY_PASSWORD }}

      - name: Log in to Docker Hub
        uses: docker/login-action@b45d80f862d83dbcd57f89517bcf500b2ab88fb2 # v4
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_PASSWORD }}

      - name: Build and push builder image to Aliyun Registry
        uses: docker/build-push-action@d08e5c354a6adb9ed34480a06d141179aa583294 # v7
        with:
          context: .
          platforms: linux/amd64
          push: true
          tags: |
            ${{ env.ALIYUN_PREFIX }}:builder
          file: .devops/builder.Dockerfile
          provenance: false
          cache-from: type=registry,ref=${{ env.ALIYUN_PREFIX }}:buildcache-builder-amd64
          cache-to: type=registry,ref=${{ env.ALIYUN_PREFIX }}:buildcache-builder-amd64,mode=max

      - name: Build and push builder image to Docker Hub
        uses: docker/build-push-action@d08e5c354a6adb9ed34480a06d141179aa583294 # v7
        with:
          context: .
          platforms: linux/amd64
          push: true
          tags: |
            ${{ env.DOCKERHUB_PREFIX }}:builder
          file: .devops/builder.Dockerfile
          provenance: false
          cache-from: type=registry,ref=${{ env.ALIYUN_PREFIX }}:buildcache-builder-amd64

  build_builder_cann:
    name: Build and push offline builder image (ARM64 CANN)
    runs-on: ubuntu-24.04-arm

    steps:
      - name: Check out the repo
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@4d04d5d9486b7bd6fa91e7baf45bbb4f8b9deedd # v4

      - name: Log in to Aliyun Registry
        uses: docker/login-action@b45d80f862d83dbcd57f89517bcf500b2ab88fb2 # v4
        with:
          registry: ${{ secrets.ALIYUN_REGISTRY }}
          username: ${{ secrets.ALIYUN_REGISTRY_USER }}
          password: ${{ secrets.ALIYUN_REGISTRY_PASSWORD }}

      - name: Log in to Docker Hub
        uses: docker/login-action@b45d80f862d83dbcd57f89517bcf500b2ab88fb2 # v4
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_PASSWORD }}

      - name: Pull CANN base image
        run: docker pull ascendai/cann:8.5.0-910b-openeuler24.03-py3.11

      - name: Build and push CANN builder image to Aliyun Registry
        uses: docker/build-push-action@d08e5c354a6adb9ed34480a06d141179aa583294 # v7
        with:
          context: .
          platforms: linux/arm64
          push: true
          tags: |
            ${{ env.ALIYUN_PREFIX }}:builder-cann
          file: .devops/builder-cann.Dockerfile
          provenance: false
          cache-from: type=registry,ref=${{ env.ALIYUN_PREFIX }}:buildcache-builder-cann-arm64
          cache-to: type=registry,ref=${{ env.ALIYUN_PREFIX }}:buildcache-builder-cann-arm64,mode=max

      - name: Build and push CANN builder image to Docker Hub
        uses: docker/build-push-action@d08e5c354a6adb9ed34480a06d141179aa583294 # v7
        with:
          context: .
          platforms: linux/arm64
          push: true
          tags: |
            ${{ env.DOCKERHUB_PREFIX }}:builder-cann
          file: .devops/builder-cann.Dockerfile
          provenance: false
          cache-from: type=registry,ref=${{ env.ALIYUN_PREFIX }}:buildcache-builder-cann-arm64

  build_builder_cuda:
    name: Build and push offline builder image (x64 CUDA)
    runs-on: ubuntu-24.04

    steps:
      - name: Check out the repo
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@4d04d5d9486b7bd6fa91e7baf45bbb4f8b9deedd # v4

      - name: Log in to Aliyun Registry
        uses: docker/login-action@b45d80f862d83dbcd57f89517bcf500b2ab88fb2 # v4
        with:
          registry: ${{ secrets.ALIYUN_REGISTRY }}
          username: ${{ secrets.ALIYUN_REGISTRY_USER }}
          password: ${{ secrets.ALIYUN_REGISTRY_PASSWORD }}

      - name: Log in to Docker Hub
        uses: docker/login-action@b45d80f862d83dbcd57f89517bcf500b2ab88fb2 # v4
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_PASSWORD }}

      - name: Build and push CUDA builder image to Aliyun Registry
        uses: docker/build-push-action@d08e5c354a6adb9ed34480a06d141179aa583294 # v7
        with:
          context: .
          platforms: linux/amd64
          push: true
          tags: |
            ${{ env.ALIYUN_PREFIX }}:builder-cuda
          file: .devops/builder-cuda.Dockerfile
          provenance: false
          cache-from: type=registry,ref=${{ env.ALIYUN_PREFIX }}:buildcache-builder-cuda-amd64
          cache-to: type=registry,ref=${{ env.ALIYUN_PREFIX }}:buildcache-builder-cuda-amd64,mode=max

      - name: Build and push CUDA builder image to Docker Hub
        uses: docker/build-push-action@d08e5c354a6adb9ed34480a06d141179aa583294 # v7
        with:
          context: .
          platforms: linux/amd64
          push: true
          tags: |
            ${{ env.DOCKERHUB_PREFIX }}:builder-cuda
          file: .devops/builder-cuda.Dockerfile
          provenance: false
          cache-from: type=registry,ref=${{ env.ALIYUN_PREFIX }}:buildcache-builder-cuda-amd64